name: Network Flood Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-flood-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run flood test script
        run: |
          python router_dih.py
